<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENAI SP Calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow:hidden;

    font-family:'Orbitron', sans-serif;

    background:
    radial-gradient(circle at top,
    #5a189a,
    #240046,
    #10002b,
    #000000);
}

/* ESTRELAS */

.stars{

    position:fixed;

    width:100%;
    height:100%;

    top:0;
    left:0;

    background:url("https://www.transparenttextures.com/patterns/stardust.png");

    opacity:0.5;

    animation: estrelas 25s linear infinite;
}

@keyframes estrelas{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-150px);
    }
}

/* CARD */

.calculadora{

    position:relative;

    width:100%;
    max-width:450px;

    padding:40px 30px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 0 25px rgba(162,0,255,0.5),
    0 0 60px rgba(128,0,255,0.2);

    z-index:2;
}

/* PLANETA */

.planeta{

    position:absolute;

    width:160px;
    height:160px;

    background:
    radial-gradient(circle,
    #d0a2ff,
    #9d4edd,
    #5a189a);

    border-radius:50%;

    top:-60px;
    right:-60px;

    opacity:0.4;

    filter:blur(2px);

    box-shadow:0 0 50px #9d4edd;
}

/* TITULO */

.titulo{

    text-align:center;

    margin-bottom:35px;
}

.titulo h1{

    color:white;

    font-size:40px;

    letter-spacing:4px;

    text-shadow:
    0 0 10px #d0a2ff,
    0 0 25px #9d4edd;
}

.titulo p{

    margin-top:10px;

    color:#e9d5ff;

    font-size:14px;
}

/* INPUTS */

.input-box{

    margin-bottom:20px;
}

.input-box label{

    color:white;

    display:block;

    margin-bottom:8px;

    font-size:14px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    outline:none;

    border-radius:15px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:18px;

    border:1px solid transparent;

    transition:0.3s;
}

.input-box input:focus{

    border:1px solid #c77dff;

    box-shadow:0 0 15px #9d4edd;
}

.input-box input::placeholder{

    color:#ddd;
}

/* BOTÕES */

.botoes{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

    margin-top:25px;
}

button{

    padding:15px;

    border:none;

    border-radius:15px;

    font-size:15px;

    font-weight:bold;

    color:white;

    cursor:pointer;

    transition:0.3s;

    font-family:'Orbitron', sans-serif;
}

button:hover{

    transform:scale(1.05);
}

/* CORES */

.soma{

    background:linear-gradient(45deg,#7b2ff7,#f107a3);
}

.sub{

    background:linear-gradient(45deg,#5f72ff,#9b23ea);
}

.mult{

    background:linear-gradient(45deg,#8e2de2,#4a00e0);
}

.div{

    background:linear-gradient(45deg,#c471ed,#f64f59);
}

/* RESULTADO */

.resultado{

    margin-top:30px;

    padding:25px;

    border-radius:20px;

    text-align:center;

    background:rgba(0,0,0,0.35);

    border:1px solid rgba(255,255,255,0.1);

    color:white;

    min-height:110px;
}

.resultado h2{

    margin-bottom:12px;

    color:#e9d5ff;
}

#textoResultado{

    font-size:28px;

    text-shadow:0 0 12px #c77dff;
}

/* RESPONSIVO */

@media(max-width:600px){

    .calculadora{

        padding:30px 20px;
    }

    .titulo h1{

        font-size:30px;
    }

    .titulo p{

        font-size:12px;
    }

    .botoes{

        grid-template-columns:1fr;
    }

    button{

        font-size:14px;
    }

    #textoResultado{

        font-size:22px;
    }

    .planeta{

        width:120px;
        height:120px;

        top:-40px;
        right:-40px;
    }
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="calculadora">

    <div class="planeta"></div>

    <div class="titulo">

        <h1>SENAI SP</h1>

        <p>Calculadora Profissional</p>

    </div>

    <div class="input-box">

        <label>Primeiro Valor</label>

        <input type="number" id="n1" placeholder="Digite um número">

    </div>

    <div class="input-box">

        <label>Segundo Valor</label>

        <input type="number" id="n2" placeholder="Digite outro número">

    </div>

    <div class="botoes">

        <button class="soma" onclick="somar()">
            SOMA
        </button>

        <button class="sub" onclick="subtrair()">
            SUBTRAÇÃO
        </button>

        <button class="mult" onclick="multiplicar()">
            MULTIPLICAR
        </button>

        <button class="div" onclick="dividir()">
            DIVIDIR
        </button>

    </div>

    <div class="resultado">

        <h2>RESULTADO</h2>

        <div id="textoResultado">

            Aguardando cálculo...

        </div>

    </div>

</div>

<script>

function pegarValores(){

    let n1 = Number(document.getElementById("n1").value)

    let n2 = Number(document.getElementById("n2").value)

    return [n1, n2]
}

function mostrarResultado(texto){

    document.getElementById("textoResultado").innerHTML = texto
}

function somar(){

    let valores = pegarValores()

    let resultado = valores[0] + valores[1]

    mostrarResultado(resultado)
}

function subtrair(){

    let valores = pegarValores()

    let resultado = valores[0] - valores[1]

    mostrarResultado(resultado)
}

function multiplicar(){

    let valores = pegarValores()

    let resultado = valores[0] * valores[1]

    mostrarResultado(resultado)
}

function dividir(){

    let valores = pegarValores()

    if(valores[1] == 0){

        mostrarResultado("Erro: divisão por zero")
    }

    else{

        let resultado = valores[0] / valores[1]

        mostrarResultado(resultado)
    }
}

</script>

</body>
</html>
